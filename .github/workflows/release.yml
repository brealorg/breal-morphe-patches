name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version already committed through a pull request, for example 1.4.95'
        required: true
        type: string
      release_notes:
        description: 'Human-readable GitHub Release notes: title, app/area, Changes, User impact'
        required: true
        type: string
      confirm:
        description: 'Type MORPHE_RELEASE_FROM_PROTECTED_MAIN'
        required: true
        type: string

concurrency:
  group: morphe-release
  cancel-in-progress: false

jobs:
  release:
    name: Publish merged Morphe release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    env:
      VERSION: ${{ inputs.version }}
      RELEASE_NOTES: ${{ inputs.release_notes }}
      CONFIRM: ${{ inputs.confirm }}
      RELEASE_COMMIT: ${{ github.sha }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Validate protected-main dispatch
        shell: bash
        run: |
          set -euo pipefail

          test "$GITHUB_REF_NAME" = "main"
          test "$CONFIRM" = "MORPHE_RELEASE_FROM_PROTECTED_MAIN"
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          test -n "$RELEASE_NOTES"

          TAG="morphe-patches-${VERSION##*.}"
          NOTES_FILE="$RUNNER_TEMP/release-notes-$VERSION.md"
          printf '%s\n' "$RELEASE_NOTES" > "$NOTES_FILE"

          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "NOTES_FILE=$NOTES_FILE" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION"
          echo "TAG=$TAG"
          echo "RELEASE_COMMIT=$RELEASE_COMMIT"

      - name: Checkout exact main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install ripgrep
        shell: bash
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes ripgrep
          fi
          rg --version

      - name: Verify project contracts
        run: ./tools/check-project-contracts.sh

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
        with:
          cache-provider: basic

      - name: Validate release signing config
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_FINGERPRINT: ${{ vars.GPG_FINGERPRINT }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$GPG_PRIVATE_KEY"
          test -n "$GPG_PASSPHRASE"
          test -n "$GPG_FINGERPRINT"

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          fingerprint: ${{ vars.GPG_FINGERPRINT }}

      - name: Publish from protected main
        env:
          GPG_FINGERPRINT: ${{ vars.GPG_FINGERPRINT }}
        shell: bash
        run: |
          set -euo pipefail

          python3 scripts/releasectl.py publish \
            --version "$VERSION" \
            --tag "$TAG" \
            --release-notes-file "$NOTES_FILE" \
            --protected-main-commit "$RELEASE_COMMIT" \
            --signing-identity "$GPG_FINGERPRINT"

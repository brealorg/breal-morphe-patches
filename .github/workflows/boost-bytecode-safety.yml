name: Boost bytecode safety

on:
  pull_request:
    paths:
      - 'patches/src/main/kotlin/app/morphe/patches/reddit/customclients/boostforreddit/**'
      - 'tools/boost-bytecode-safety-gate.sh'
      - 'tools/boost_bytecode_safety.py'
      - 'tools/build-boost-candidate.sh'
      - 'tools/build-boost-devclone-candidate.sh'
      - 'tools/boost-dev-from-mpp.sh'
      - 'scripts/releasectl.py'
      - 'tests/fixtures/bytecode-safety/**'
      - 'tests/tools/test_boost_bytecode_safety.py'
      - '.github/workflows/boost-bytecode-safety.yml'
  push:
    branches:
      - main
      - dev
    paths:
      - 'patches/src/main/kotlin/app/morphe/patches/reddit/customclients/boostforreddit/**'
      - 'tools/boost-bytecode-safety-gate.sh'
      - 'tools/boost_bytecode_safety.py'
      - 'tools/build-boost-candidate.sh'
      - 'tools/build-boost-devclone-candidate.sh'
      - 'tools/boost-dev-from-mpp.sh'
      - 'scripts/releasectl.py'
      - 'tests/fixtures/bytecode-safety/**'
      - 'tests/tools/test_boost_bytecode_safety.py'
      - '.github/workflows/boost-bytecode-safety.yml'

permissions:
  contents: read

jobs:
  fixture-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Shell syntax
        run: |
          bash -n tools/boost-bytecode-safety-gate.sh
          bash -n tools/build-boost-candidate.sh
          bash -n tools/build-boost-devclone-candidate.sh
          bash -n tools/boost-dev-from-mpp.sh
      - name: Bytecode safety regression fixtures
        run: python3 -m unittest -q tests/tools/test_boost_bytecode_safety.py

name: 🐞 Bug report
description: Report a bug or an issue.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        # Morphe bug report

        Before creating a new bug report, please keep the following in mind:

        - **Do not submit a duplicate bug report**: Search for existing bug reports [here](https://github.com/brealorg/breal-morphe-patches/issues?q=label%3A%22bug%22).
        - **Review the contribution guidelines**: Make sure your bug report adheres to them. You can find the guidelines [here](https://github.com/brealorg/breal-morphe-patches/blob/main/CONTRIBUTING.md).
        - **Release verification policy**: User-visible fixes stay open until the fix is released and verified through Morphe Manager / the normal installation path when applicable.
  - type: dropdown
    id: affected-app
    attributes:
      label: Affected app or area
      description: Where does the problem occur?
      options:
        - Boost for Reddit
        - Imgur
        - Another supported app
        - Patch bundle or repository tooling
    validations:
      required: true
  - type: input
    id: patch-version
    attributes:
      label: Morphe patch version
      description: Enter the installed Morphe patch bundle version, or N/A for a repository/tooling issue.
      placeholder: "Use the exact version shown in Morphe Manager"
    validations:
      required: true
  - type: input
    id: last-working-version
    attributes:
      label: Last known working patch version
      description: If this is a regression, enter the most recent version where it worked.
      placeholder: "Enter the previous version or Unknown"
  - type: dropdown
    id: installation-type
    attributes:
      label: Installation type
      description: How was the patched app installed?
      options:
        - Morphe Manager / normal patched app
        - Boost DEV test build
        - Other / manual installation
        - Not applicable
    validations:
      required: true
  - type: input
    id: android-version
    attributes:
      label: Android version
      description: Include beta or preview information when applicable.
      placeholder: "For example: Android 16 or Android 17 Beta"
    validations:
      required: true
  - type: input
    id: device-model
    attributes:
      label: Device model
      description: Enter the manufacturer and model.
      placeholder: "For example: Google Pixel 6"
    validations:
      required: true
  - type: dropdown
    id: navigation-mode
    attributes:
      label: Android navigation mode
      description: Select Not relevant for bugs unrelated to navigation or layout.
      options:
        - Gesture navigation
        - 3-button navigation
        - 2-button navigation
        - Not relevant or unknown
    validations:
      required: true
  - type: dropdown
    id: reproduction-frequency
    attributes:
      label: Reproduction frequency
      options:
        - Always
        - Often
        - Sometimes
        - Happened once
        - Unable to reproduce again
    validations:
      required: true
  - type: input
    id: affected-url
    attributes:
      label: Affected content URL
      description: Add the relevant Reddit, Imgur, media, or other public URL when applicable.
      placeholder: "https://..."
  - type: textarea
    id: bug-description
    attributes:
      label: Bug description
      description: |
        - Describe the actual and expected behavior
        - Add exact reproduction steps when possible (Step 1. ... Step 2. ...)
        - Add images and videos when useful
    validations:
      required: true
  - type: textarea
    id: error-logs
    attributes:
      label: Error logs
      description: |
        Add relevant logs when available.
        Before posting publicly, remove access tokens, cookies, OAuth credentials, email addresses, usernames, and other personal information.
        Developers can classify a captured logcat with `tools/classify-runtime-logcat.sh --logcat <captured-logcat.txt> --out-dir <out-dir> --package <package>`.
      render: shell
  - type: textarea
    id: solution
    attributes:
      label: Possible solution
      description: If applicable, describe a possible fix or workaround.
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add relevant settings, orientation, theme, or other context here.
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      description: Your bug report may be closed if the checklist below is not followed.
      options:
        - label: I have checked whether this issue still occurs with the latest available Morphe patch version.
          required: true
        - label: I have checked all open and closed bug reports and this is not a duplicate.
          required: true
        - label: I have removed secrets, authentication data, and personal information from public logs and screenshots.
          required: true
        - label: All requested information has been provided properly.
          required: true
